apiversion: modelslim_v1
metadata:
  config_id: qwq-32b-dense-w8a8
  score: 90
  verified_model_types:
    - Qwen-QwQ-32B
    - QwQ-32B
  label:
    w_bit: 8
    a_bit: 8
    is_sparse: False
    kv_cache: False

default_w8a8: &default_w8a8
  act:
    scope: "per_tensor"
    dtype: "int8"
    symmetric: false
    method: "minmax"
  weight:
    scope: "per_channel"
    dtype: "int8"
    symmetric: true
    method: "minmax"


spec:
  process:
    - type: "quarot"
      block_size: 32
    - type: "iter_smooth"
      alpha: 0.5
      scale_min: 1e-5
      symmetric: true
      enable_subgraph_type:
        - 'norm-linear'
        - 'up-down'
      include:
        - "*"
    - type: "linear_quant"
      qconfig: *default_w8a8
      include:
        - "*"
      exclude:
        - "lm_head"
        - "*.down_proj"

  dataset: autocodebench.jsonl
  save:
    - type: "ascendv1_saver"
      part_file_size: 4
